<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,__LOGO__">
  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.4/marked.min.js"></script>
  <link id="hljs-dark-css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css">
  <link id="hljs-light-css" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css" disabled>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <!-- EasyMDE Editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
  <style>
__STYLE__
  </style>
</head>
<body>

  <header class="header">
    <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">&#9776;</button>
    <div class="header-logo" onclick="showDashboard()" style="cursor:pointer" title="Back to dashboard">
      <img class="icon" src="data:image/png;base64,__LOGO__" alt="MD">
      <span>Markdown Viewer</span>
    </div>
    <div class="header-meta">
      <span class="header-badge badge-path" id="badgePath"></span>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px"><circle cx="12" cy="12" r="5"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></g></svg> Light</button>
      <button class="print-btn" onclick="window.print()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-1px"><path d="M19 8H5c-1.66 0-3 1.34-3 3v4c0 1.1.9 2 2 2h2v2c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2v-2h2c1.1 0 2-.9 2-2v-4c0-1.66-1.34-3-3-3zm-4 11H9v-5h6v5zm4-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-2-8H7v4h10V4z"/></svg> Print</button>
      <button class="settings-btn" onclick="openSettings()" title="Settings"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="search-box">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><line x1="15.5" y1="15.5" x2="21" y2="21"/></svg>
      <input type="text" id="search" placeholder="Search across all files..." oninput="handleSearch(this.value)">
    </div>
    <div class="search-results" id="searchResults"></div>
    <div class="sidebar-toolbar" id="sidebarToolbar" style="display:none">
      <div class="sidebar-section-label">Explorer <span id="fileCount" class="file-count"></span></div>
      <button class="collapse-btn" onclick="collapseAll()" title="Collapse all folders"><svg width="10" height="10" viewBox="0 0 10 10"><polygon points="2,0 8,5 2,10" fill="currentColor"/></svg> Collapse all</button>
    </div>
    <div id="navItems"></div>
    <div class="toc-container" id="tocContainer"></div>
  </nav>

  <div class="reading-progress"><div class="reading-progress-bar" id="progressBar"></div></div>
  <div class="tab-bar" id="tabBar"></div>

  <main class="main" id="main">
    <div class="content-wrapper">
      <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Loading...</div></div>
      <div class="breadcrumb-bar" id="breadcrumbBar" style="display:none">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="content-toolbar" id="contentToolbar">
          <button class="edit-btn" id="editBtn" onclick="toggleEditMode()" title="Toggle edit mode"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>
          <button class="collapse-btn" onclick="collapseSections(true)" title="Collapse all sections"><svg width="10" height="10" viewBox="0 0 10 10"><polygon points="2,0 8,5 2,10" fill="currentColor"/></svg> Collapse</button>
          <button class="collapse-btn" onclick="collapseSections(false)" title="Expand all sections"><svg width="10" height="10" viewBox="0 0 10 10"><polygon points="0,2 10,2 5,8" fill="currentColor"/></svg> Expand</button>
        </div>
      </div>
      <article class="md" id="content" style="display:none"></article>
      <!-- Editor container -->
      <div class="editor-wrapper" id="editorWrapper" style="display:none">
        <div class="editor-scroll-area">
          <textarea id="editor"></textarea>
        </div>
        <div class="editor-footer">
          <div class="editor-status" id="editorStatus"></div>
          <button class="editor-save-btn" id="editorSaveBtn" onclick="saveFile()" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
        </div>
      </div>
    </div>
  </main>

  <button class="back-to-top" id="backToTop" onclick="document.body.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

  <div class="toc-right-panel" id="tocRightPanel"></div>

  <div class="settings-overlay" id="settingsOverlay" style="display:none" onclick="if(event.target===this)closeSettings()">
    <div class="settings-modal">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="settings-close" onclick="closeSettings()">&#x2715;</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">File Icon Style</div>
          <div class="settings-options">
            <label class="settings-option">
              <input type="radio" name="iconStyle" value="colorful" onchange="applyIconStyle('colorful')">
              <div class="settings-option-preview" style="display:flex;gap:3px;align-items:center;">
                <svg width="18" height="21" viewBox="0 0 48 56" fill="none"><path d="M4 4a4 4 0 0 1 4-4h22l14 14v38a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V4z" fill="url(#prev-grad-a)"/><path d="M26 0l14 14H30a4 4 0 0 1-4-4V0z" fill="rgba(255,255,255,0.25)"/><defs><linearGradient id="prev-grad-a" x1="0" y1="0" x2="48" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#7c8aff"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs></svg>
                <svg width="18" height="21" viewBox="0 0 48 56" fill="none"><path d="M4 4a4 4 0 0 1 4-4h22l14 14v38a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V4z" fill="url(#prev-grad-b)"/><path d="M26 0l14 14H30a4 4 0 0 1-4-4V0z" fill="rgba(255,255,255,0.25)"/><defs><linearGradient id="prev-grad-b" x1="0" y1="0" x2="48" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#4ade80"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs></svg>
                <svg width="18" height="21" viewBox="0 0 48 56" fill="none"><path d="M4 4a4 4 0 0 1 4-4h22l14 14v38a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V4z" fill="url(#prev-grad-c)"/><path d="M26 0l14 14H30a4 4 0 0 1-4-4V0z" fill="rgba(255,255,255,0.25)"/><defs><linearGradient id="prev-grad-c" x1="0" y1="0" x2="48" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#fbbf24"/><stop offset="1" stop-color="#f97316"/></linearGradient></defs></svg>
              </div>
              <div class="settings-option-label">Colorful</div>
              <div class="settings-option-desc">Gradient colors per file</div>
            </label>
            <label class="settings-option">
              <input type="radio" name="iconStyle" value="monochrome" onchange="applyIconStyle('monochrome')">
              <div class="settings-option-preview" style="display:flex;gap:3px;align-items:center;">
                <svg width="18" height="21" viewBox="0 0 48 56" fill="none"><path d="M4 4a4 4 0 0 1 4-4h22l14 14v38a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V4z" style="fill:var(--accent-dim);stroke:var(--accent);stroke-width:2"/><path d="M26 0l14 14H30a4 4 0 0 1-4-4V0z" style="fill:var(--accent)"/></svg>
                <svg width="18" height="21" viewBox="0 0 48 56" fill="none"><path d="M4 4a4 4 0 0 1 4-4h22l14 14v38a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V4z" style="fill:var(--accent-dim);stroke:var(--accent);stroke-width:2"/><path d="M26 0l14 14H30a4 4 0 0 1-4-4V0z" style="fill:var(--accent)"/></svg>
                <svg width="18" height="21" viewBox="0 0 48 56" fill="none"><path d="M4 4a4 4 0 0 1 4-4h22l14 14v38a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V4z" style="fill:var(--accent-dim);stroke:var(--accent);stroke-width:2"/><path d="M26 0l14 14H30a4 4 0 0 1-4-4V0z" style="fill:var(--accent)"/></svg>
              </div>
              <div class="settings-option-label">Monochrome</div>
              <div class="settings-option-desc">Single accent color</div>
            </label>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">Table of Contents</div>
          <div class="settings-options">
            <label class="settings-option">
              <input type="radio" name="tocPosition" value="sidebar" onchange="applyTocPosition('sidebar')">
              <div class="settings-option-preview settings-option-preview-toc">
                <div class="toc-preview-sidebar"></div>
                <div class="toc-preview-content"></div>
              </div>
              <div class="settings-option-label">Sidebar</div>
              <div class="settings-option-desc">TOC below file list</div>
            </label>
            <label class="settings-option">
              <input type="radio" name="tocPosition" value="right" onchange="applyTocPosition('right')">
              <div class="settings-option-preview settings-option-preview-toc">
                <div class="toc-preview-content"></div>
                <div class="toc-preview-right"></div>
              </div>
              <div class="settings-option-label">Right Panel</div>
              <div class="settings-option-desc">Fixed panel on right</div>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-context-menu" id="tabContextMenu" style="display:none">
    <button class="tab-ctx-item" onclick="tabCtxClose()">Close</button>
    <button class="tab-ctx-item" onclick="tabCtxCloseOthers()">Close Others</button>
    <button class="tab-ctx-item" onclick="tabCtxCloseToRight()">Close to the Right</button>
    <button class="tab-ctx-item" onclick="tabCtxCloseToLeft()">Close to the Left</button>
    <div class="tab-ctx-sep"></div>
    <button class="tab-ctx-item" onclick="tabCtxCloseAll()">Close All</button>
  </div>

  <div class="whats-new-overlay" id="whatsNewOverlay" style="display:none" onclick="if(event.target===this)closeWhatsNew()">
    <div class="whats-new-modal">
      <h2>What's New</h2>
      <span class="version-badge" id="whatsNewVersion"></span>
      <div class="whats-new-body" id="whatsNewBody"></div>
      <button onclick="closeWhatsNew()">Got it</button>
    </div>
  </div>

<script>
__SCRIPT__
</script>
</body>
</html>
